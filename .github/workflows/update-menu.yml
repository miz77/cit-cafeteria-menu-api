name: Update cafeteria menu data

on:
  schedule:
    # Monday 05:07 JST. Avoid minute 0 because scheduled workflows can be delayed/dropped during high load.
    - cron: "7 5 * * 1"
      timezone: "Asia/Tokyo"
    # Monday 08:17 JST. Second chance after the weekly PDF has likely been replaced.
    - cron: "17 8 * * 1"
      timezone: "Asia/Tokyo"
    # Tuesday 08:27 JST. Backup if Monday PDF replacement or scheduled workflow was delayed.
    - cron: "27 8 * * 2"
      timezone: "Asia/Tokyo"
  workflow_dispatch:
    inputs:
      target_date:
        description: "Optional Asia/Tokyo date to use for week calculation, YYYY-MM-DD"
        required: false
        type: string
      force:
        description: "Fetch from CIT even if the current week was already generated"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: cafeteria-menu-ingest
  cancel-in-progress: false

jobs:
  update:
    name: Fetch, parse, generate, and upload KV JSON
    if: github.event_name != 'schedule' || vars.ENABLE_SCHEDULED_INGEST == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
      TARGET_DATE: ${{ inputs.target_date || '' }}
      FORCE_REFRESH: ${{ inputs.force || 'false' }}
      MAX_SOURCE_PDF_BYTES: "5242880"
      HARD_MAX_SOURCE_PDF_BYTES: "10485760"
      EXPECTED_PAGES_PER_PDF: "1"
      MAX_PAGES_PER_PDF: "3"
      MAX_TEXT_ITEMS_PER_PDF: "30000"
      MAX_RAW_TEXT_CHARS_PER_LOCATION_PER_DATE: "20000"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ingest tests
        run: pnpm --filter @cit-cafeteria/ingest test

      - name: Generate and upload cafeteria menu JSON
        shell: bash
        run: |
          set -euo pipefail

          delays=(0 90 300)
          for attempt in 1 2 3; do
            delay="${delays[$((attempt - 1))]}"
            if [ "$delay" -gt 0 ]; then
              echo "Waiting ${delay}s before ingest attempt ${attempt}/3..."
              sleep "$delay"
            fi

            echo "Running ingest attempt ${attempt}/3..."
            set +e
            pnpm --filter @cit-cafeteria/ingest ingest
            code=$?
            set -e

            if [ "$code" -eq 0 ]; then
              echo "Ingest succeeded on attempt ${attempt}/3."
              exit 0
            fi

            if [ "$code" -eq 20 ]; then
              echo "Ingest failed with a non-retryable error." >&2
              if [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
                {
                  echo "## Cafeteria Ingest Failed"
                  echo
                  echo "- Reason: non-retryable ingest failure"
                  echo "- Exit code: \`20\`"
                  echo "- Retry: not attempted"
                  echo
                } >> "$GITHUB_STEP_SUMMARY"
              fi
              exit 20
            fi

            if [ "$code" -ne 10 ]; then
              echo "Ingest failed with unexpected exit code ${code}." >&2
              exit "$code"
            fi

            echo "Ingest attempt ${attempt}/3 failed with a retryable error." >&2
          done

          echo "Ingest failed after 3 retryable attempts." >&2
          exit 10

  heartbeat:
    name: Record scheduled workflow heartbeat
    if: >-
      ${{
        github.event_name == 'schedule' &&
        vars.ENABLE_SCHEDULED_INGEST == 'true'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Check out default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Record first scheduled run of the JST week
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          WORKFLOW_RUN_ATTEMPT: ${{ github.run_attempt }}
          WORKFLOW_RUN_ID: ${{ github.run_id }}
          WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          heartbeat_path=".github/scheduled-ingest-heartbeat.json"
          week="$(TZ=Asia/Tokyo date '+%G-W%V')"
          recorded_at_local="$(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M:%S')"

          if [ -f "$heartbeat_path" ]; then
            recorded_week="$(jq -er '.week | select(type == "string")' "$heartbeat_path")"
            if [ "$recorded_week" = "$week" ]; then
              echo "Heartbeat already recorded for ${week}."
              exit 0
            fi
          fi

          jq -n \
            --arg week "$week" \
            --arg recordedAtLocal "$recorded_at_local" \
            --arg timeZone "Asia/Tokyo" \
            --arg workflowRunId "$WORKFLOW_RUN_ID" \
            --argjson workflowRunAttempt "$WORKFLOW_RUN_ATTEMPT" \
            --arg workflowRunUrl "$WORKFLOW_RUN_URL" \
            '{
              week: $week,
              recordedAtLocal: $recordedAtLocal,
              timeZone: $timeZone,
              workflowRunId: $workflowRunId,
              workflowRunAttempt: $workflowRunAttempt,
              workflowRunUrl: $workflowRunUrl
            }' > "$heartbeat_path"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- "$heartbeat_path"

          if git diff --cached --quiet; then
            echo "Heartbeat file is unchanged."
            exit 0
          fi

          git commit -m "chore(ops): record scheduled workflow heartbeat (${week})"
          git pull --rebase origin "$DEFAULT_BRANCH"
          git push origin "HEAD:${DEFAULT_BRANCH}"
