name: Update cafeteria menu data

on:
  schedule:
    # Monday 05:07 JST. Avoid minute 0 because scheduled workflows can be delayed/dropped during high load.
    - cron: "7 5 * * 1"
      timezone: "Asia/Tokyo"
    # Monday 08:17 JST. Second chance after the weekly PDF has likely been replaced.
    - cron: "17 8 * * 1"
      timezone: "Asia/Tokyo"
    # Tuesday 08:27 JST. Backup if Monday PDF replacement or scheduled workflow was delayed.
    - cron: "27 8 * * 2"
      timezone: "Asia/Tokyo"
  workflow_dispatch:
    inputs:
      target_date:
        description: "Optional Asia/Tokyo date to use for week calculation, YYYY-MM-DD"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: cafeteria-menu-ingest
  cancel-in-progress: false

jobs:
  update:
    name: Fetch, parse, generate, and upload KV JSON
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
      TARGET_DATE: ${{ inputs.target_date || '' }}
      MAX_SOURCE_PDF_BYTES: "5242880"
      HARD_MAX_SOURCE_PDF_BYTES: "10485760"
      EXPECTED_PAGES_PER_PDF: "1"
      MAX_PAGES_PER_PDF: "3"
      MAX_TEXT_ITEMS_PER_PDF: "30000"
      MAX_RAW_TEXT_CHARS_PER_LOCATION_PER_DATE: "20000"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ingest tests
        run: pnpm --filter @cit-cafeteria/ingest test

      - name: Generate and upload cafeteria menu JSON
        shell: bash
        run: |
          set -euo pipefail

          delays=(0 90 300)
          for attempt in 1 2 3; do
            delay="${delays[$((attempt - 1))]}"
            if [ "$delay" -gt 0 ]; then
              echo "Waiting ${delay}s before ingest attempt ${attempt}/3..."
              sleep "$delay"
            fi

            echo "Running ingest attempt ${attempt}/3..."
            if pnpm --filter @cit-cafeteria/ingest ingest; then
              echo "Ingest succeeded on attempt ${attempt}/3."
              exit 0
            fi

            echo "Ingest attempt ${attempt}/3 failed." >&2
          done

          echo "Ingest failed after 3 attempts." >&2
          exit 1
