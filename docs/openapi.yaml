openapi: 3.1.0
info:
  title: CIT Cafeteria Menu API
  version: 1.0.0-beta
  summary: 千葉工業大学の学食メニューを返す非公式 JSON API。
  description: CITサービスが公開している学食メニュー PDF から生成した非公式 JSON API です。正確性は保証しません。
  license:
    name: MIT
tags:
  - name: locations
  - name: menus
  - name: sources
  - name: health
paths:
  /api/v1/locations:
    get:
      tags: [locations]
      summary: 食堂一覧を返します。
      responses:
        "200":
          description: 食堂一覧
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationsResponse"
        "404":
          $ref: "#/components/responses/Problem"
  /api/v1/menus/today:
    get:
      tags: [menus]
      summary: 今日の全食堂メニューを返します。
      responses:
        "200":
          description: 全食堂の日次メニュー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuDocument"
        "404":
          $ref: "#/components/responses/Problem"
  /api/v1/menus/week:
    get:
      tags: [menus]
      summary: 今週の全食堂メニューを返します。
      responses:
        "200":
          description: 全食堂の週次メニュー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuWeekDocument"
        "404":
          $ref: "#/components/responses/Problem"
  /api/v1/menus/{date}:
    get:
      tags: [menus]
      summary: 指定日の全食堂メニューを返します。
      parameters:
        - $ref: "#/components/parameters/Date"
      responses:
        "200":
          description: 全食堂の日次メニュー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuDocument"
        "400":
          $ref: "#/components/responses/Problem"
        "404":
          $ref: "#/components/responses/Problem"
  /api/v1/locations/{locationId}/menus/today:
    get:
      tags: [menus]
      summary: 今日の指定食堂メニューを返します。
      parameters:
        - $ref: "#/components/parameters/LocationId"
      responses:
        "200":
          description: 指定食堂の日次メニュー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationMenuDocument"
        "404":
          $ref: "#/components/responses/Problem"
  /api/v1/locations/{locationId}/menus/week:
    get:
      tags: [menus]
      summary: 今週の指定食堂メニューを返します。
      parameters:
        - $ref: "#/components/parameters/LocationId"
      responses:
        "200":
          description: 指定食堂の週次メニュー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationMenuWeekDocument"
        "404":
          $ref: "#/components/responses/Problem"
  /api/v1/locations/{locationId}/menus/{date}:
    get:
      tags: [menus]
      summary: 指定日・指定食堂のメニューを返します。
      parameters:
        - $ref: "#/components/parameters/LocationId"
        - $ref: "#/components/parameters/Date"
      responses:
        "200":
          description: 指定食堂の日次メニュー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationMenuDocument"
        "400":
          $ref: "#/components/responses/Problem"
        "404":
          $ref: "#/components/responses/Problem"
  /api/v1/sources:
    get:
      tags: [sources]
      summary: 現在週の source metadata を返します。
      responses:
        "200":
          description: source metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourcesResponse"
        "404":
          $ref: "#/components/responses/Problem"
  /api/v1/health:
    get:
      tags: [health]
      summary: 最新 ingest/update の状態を返します。
      responses:
        "200":
          description: health response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "404":
          $ref: "#/components/responses/Problem"
  /api/v1/openapi.json:
    get:
      summary: OpenAPI document を JSON で返します。
      responses:
        "200":
          description: OpenAPI JSON
          content:
            application/json:
              schema:
                type: object
        "404":
          $ref: "#/components/responses/Problem"
components:
  parameters:
    Date:
      name: date
      in: path
      required: true
      schema:
        type: string
        pattern: ^\d{4}-\d{2}-\d{2}$
      example: "2026-07-06"
    LocationId:
      name: locationId
      in: path
      required: true
      schema:
        $ref: "#/components/schemas/LocationId"
  responses:
    Problem:
      description: Problem Details エラー
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
  schemas:
    LocationId:
      type: string
      enum: [tsudanuma, shinnarashino-1f, shinnarashino-2f]
    Location:
      type: object
      additionalProperties: false
      required: [id, name, campus, floor]
      properties:
        id:
          $ref: "#/components/schemas/LocationId"
        name:
          type: string
        campus:
          type: string
        floor:
          anyOf:
            - type: string
            - type: "null"
    LocationsResponse:
      type: object
      additionalProperties: false
      required: [locations]
      properties:
        locations:
          type: array
          minItems: 3
          maxItems: 3
          items:
            $ref: "#/components/schemas/Location"
    MenuDocument:
      $ref: "https://raw.githubusercontent.com/miz77/cit-cafeteria-menu-api/main/docs/schemas/menu.schema.json#/$defs/MenuDocument"
    LocationMenuDocument:
      $ref: "https://raw.githubusercontent.com/miz77/cit-cafeteria-menu-api/main/docs/schemas/menu.schema.json#/$defs/LocationMenuDocument"
    MenuWeekDocument:
      $ref: "https://raw.githubusercontent.com/miz77/cit-cafeteria-menu-api/main/docs/schemas/menu.schema.json#/$defs/MenuWeekDocument"
    LocationMenuWeekDocument:
      $ref: "https://raw.githubusercontent.com/miz77/cit-cafeteria-menu-api/main/docs/schemas/menu.schema.json#/$defs/LocationMenuWeekDocument"
    SourcesResponse:
      type: object
      additionalProperties: false
      required: [weekStartDate, generatedAt, sources, warnings]
      properties:
        weekStartDate:
          type: string
          pattern: ^\d{4}-\d{2}-\d{2}$
        generatedAt:
          type: string
          format: date-time
        sources:
          type: array
          items:
            type: object
            additionalProperties: false
            required: [locationId, sourcePageUrl, pdfUrl]
            properties:
              locationId:
                $ref: "#/components/schemas/LocationId"
              sourcePageUrl:
                type: string
                format: uri
              pdfUrl:
                type: string
                format: uri
              fetchedAt:
                type: string
                format: date-time
              sha256:
                type: string
              status:
                type: string
              warnings:
                type: array
                items:
                  type: string
        warnings:
          type: array
          items:
            type: string
    HealthResponse:
      type: object
      additionalProperties: false
      required: [status, checkedAt]
      properties:
        status:
          type: string
          enum: [ok, degraded, failed, unknown]
        checkedAt:
          type: string
          format: date-time
        weekStartDate:
          type: string
          pattern: ^\d{4}-\d{2}-\d{2}$
        generatedAt:
          type: string
          format: date-time
        lastError:
          anyOf:
            - type: string
            - type: "null"
    Problem:
      type: object
      additionalProperties: true
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
